    const a = AGENTS[id];
    const active = id === currentAgent ? 'active' : '';
    return `<div class="agent-tab ${active}" style="--agent-color:${a.color}" onclick="selectAgent('${id}')">${a.emoji} ${a.label}</div>`;
  }).join('');
}

function renderSidebar() {
  const el = document.getElementById('sidebar');
  const agentSessions = SESSIONS[currentAgent] || {};
  const dates = Object.keys(agentSessions).sort().reverse();
  const color = AGENTS[currentAgent].color;
  if (!dates.length) {
    el.innerHTML = '<div class="no-dates">No sessions yet</div>';
    return;
  }
  el.innerHTML = dates.map(d => {
    const active = d === currentDate ? 'active' : '';
    return `<div class="date-item ${active}" style="--agent-color:${color}" onclick="selectDate('${d}')">${d}</div>`;
  }).join('');
}

function renderChat() {
  const el = document.getElementById('chat');
  if (!currentDate) {
    el.innerHTML = '<div class="no-session">Select a date to view the session.</div>';
    return;
  }
  const msgs = (SESSIONS[currentAgent] || {})[currentDate] || [];
  if (!msgs.length) {
    el.innerHTML = '<div class="no-session">No messages in this session.</div>';
    return;
  }
  const color = AGENTS[currentAgent].color;
  el.innerHTML = msgs.map(m => {
    const isUser = m.role === 'user';
    const cls = isUser ? 'user' : 'agent';
    const sender = m.from || (isUser ? 'Felix' : currentAgent);
    const time = fmtTime(m.timestamp);
    const content = escHtml(m.content || '');
    const nameEl = !isUser ? `<div class="sender-name" style="color:${color}">${AGENTS[currentAgent].emoji} ${AGENTS[currentAgent].label}</div>` : '';
    return `
      <div class="msg ${cls}">
        ${nameEl}
        <div class="bubble">${content}</div>
        <div class="msg-meta">${isUser ? sender + ' · ' : ''}${time}</div>
      </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function selectAgent(id) {
  currentAgent = id;
  const dates = Object.keys(SESSIONS[id] || {}).sort().reverse();
  currentDate = dates[0] || null;
  renderTabs();
  renderSidebar();
  renderChat();
}

function selectDate(d) {
  currentDate = d;
  renderSidebar();
  renderChat();
}

// Init
selectAgent(AGENT_IDS[0]);
</script>
</body>
</html>
