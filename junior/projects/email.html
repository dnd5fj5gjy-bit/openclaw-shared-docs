  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

    --card-border: #E8E0D0; --ink: #2C2318; --ink-mid: #6B5F52;

    --rule: #DDD5C5;
    --shadow: 0 1px 4px rgba(44,35,24,0.07), 0 2px 12px rgba(44,35,24,0.04);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--cream); color: var(--ink); font-size: 14px; height: 100vh;
    display: flex; flex-direction: column; overflow: hidden; }

  /* HEADER */

  .header-back { font-size: 13px; font-weight: 700; color: var(--blue);
    text-decoration: none; display: flex; align-items: center; gap: 5px; }
  .header-back:hover { color: var(--terracotta); }
  .header h1 { font-size: 16px; font-weight: 800; color: var(--ink); }
  .header-meta { font-size: 11px; color: var(--ink-light); margin-left: auto; }
  .unread-badge { background: var(--terracotta); color: #fff; font-size: 11px;
    font-weight: 700; border-radius: 10px; padding: 1px 7px; margin-left: 8px; }

  /* TABS */
  .tabs { display: flex; gap: 0; background: var(--card); border-bottom: 1px solid var(--rule);
    flex-shrink: 0; padding: 0 24px; }
  .tab { padding: 10px 16px; font-size: 12px; font-weight: 700; color: var(--ink-light);
    cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s;
    white-space: nowrap; }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--terracotta); border-bottom-color: var(--terracotta); }

    padding: 1px 5px; margin-left: 4px; font-weight: 800; color: var(--ink-mid); }
  .tab.active .tab-count { background: var(--terracotta-bg); color: var(--terracotta); }

  /* MAIN LAYOUT */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* EMAIL LIST */
  .email-list { width: 360px; flex-shrink: 0; border-right: 1px solid var(--rule);
    overflow-y: auto; background: var(--card); }
  .email-item { padding: 13px 18px; border-bottom: 1px solid var(--rule);
    cursor: pointer; transition: background 0.1s; position: relative; }
  .email-item:hover { background: var(--cream); }
  .email-item.selected { background: var(--cream-deep); }
  .email-item.unread { border-left: 3px solid var(--terracotta); padding-left: 15px; }
  .email-item.handled { opacity: 0.4; }
  .email-from { font-size: 13px; font-weight: 700; color: var(--ink);
    display: flex; align-items: center; justify-content: space-between; }
  .email-from-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .email-time { font-size: 11px; color: var(--ink-light); flex-shrink: 0; margin-left: 8px; }
  .email-subject { font-size: 12px; font-weight: 600; color: var(--ink-mid);
    margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .email-preview { font-size: 11px; color: var(--ink-light); margin-top: 3px;
    line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; }
  .email-cat { font-size: 9px; font-weight: 800; text-transform: uppercase;
    padding: 1px 5px; border-radius: 3px; letter-spacing: 0.4px; margin-left: 6px; flex-shrink: 0; }
  .cat-priority { background: var(--terracotta-bg); color: var(--terracotta); }
  .cat-reply    { background: var(--amber-bg); color: var(--amber); }
  .cat-updates  { background: var(--cream-deep); color: var(--ink-light); }

  /* EMAIL DETAIL */
  .email-detail { flex: 1; overflow-y: auto; padding: 28px 32px; }
  .detail-empty { display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--ink-light); font-size: 14px; font-style: italic; }
  .detail-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--rule); }
  .detail-subject { font-size: 20px; font-weight: 800; color: var(--ink); line-height: 1.3; margin-bottom: 8px; }
  .detail-from { font-size: 13px; color: var(--ink-mid); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .detail-from-avatar { width: 28px; height: 28px; border-radius: 50%;
    background: var(--amber); color: #fff; font-size: 11px; font-weight: 800;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .detail-from-info { flex: 1; }
  .detail-from-name { font-weight: 700; color: var(--ink); }
  .detail-from-addr { font-size: 11px; color: var(--ink-light); }
  .detail-time { font-size: 11px; color: var(--ink-light); margin-left: auto; }
  .detail-body { font-size: 14px; color: var(--ink-mid); line-height: 1.75;
    white-space: pre-wrap; word-break: break-word; margin-bottom: 28px; }
  .detail-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 700;
    cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid transparent; transition: all 0.15s; }
  .btn-primary { background: var(--terracotta); color: #fff; border-color: var(--terracotta); }
  .btn-primary:hover { background: #A84A28; }
  .btn-secondary { background: var(--card); color: var(--ink); border-color: var(--card-border); }
  .btn-secondary:hover { border-color: var(--ink-mid); }
  .btn-ghost { background: none; color: var(--ink-light); border-color: var(--card-border); }
  .btn-ghost:hover { color: var(--ink); border-color: var(--ink-mid); }

  /* EMPTY STATE */
  .empty-tab { padding: 32px; text-align: center; color: var(--ink-light);
    font-size: 13px; font-style: italic; }

  @media (max-width: 700px) {
    .main { flex-direction: column; }
    .email-list { width: 100%; height: 50vh; border-right: none; border-bottom: 1px solid var(--rule); }
    .email-detail { padding: 16px; }
  }
</style>

const BOT = 'bgv_junior_bot';
let currentTab = 'all';
let selectedId = null;
const handled = new Set(JSON.parse(localStorage.getItem('handled_emails') || '[]'));

function initials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

function relTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return d.toLocaleDateString('en-GB', {day:'numeric',month:'short'});
}

function renderList() {
  const list = document.getElementById('email-list');
  const emails = EMAILS.filter(e => {
    if (handled.has(e.id)) return false;
    if (currentTab === 'all') return true;
    return e.category === currentTab;
  });

  // Update counts
  document.getElementById('count-all').textContent = EMAILS.filter(e => !handled.has(e.id)).length;
  document.getElementById('count-priority').textContent = EMAILS.filter(e => !handled.has(e.id) && e.category === 'priority').length;
  document.getElementById('count-reply').textContent = EMAILS.filter(e => !handled.has(e.id) && e.category === 'reply').length;
  document.getElementById('unread-badge').textContent = EMAILS.filter(e => !handled.has(e.id) && !e.is_read).length;

  if (!emails.length) {
    list.innerHTML = '<div class="empty-tab">Nothing here — all handled.</div>';
    return;
  }

  list.innerHTML = emails.map(e => {
    const cls = [
      'email-item',
      !e.is_read ? 'unread' : '',
      e.id === selectedId ? 'selected' : '',
    ].filter(Boolean).join(' ');
    const catCls = 'cat-' + e.category;
    return `<div class="${cls}" onclick="selectEmail('${e.id}')">
      <div class="email-from">
        <span class="email-from-name">${e.from_name}</span>
        <span class="email-cat ${catCls}">${e.category === 'reply' ? 'Reply' : e.category === 'priority' ? 'Priority' : ''}</span>
        <span class="email-time">${e.time_display}</span>
      </div>
      <div class="email-subject">${e.subject}</div>
      <div class="email-preview">${e.preview}</div>
    </div>`;
  }).join('');
}

function selectEmail(id) {
  selectedId = id;
  renderList();

  const e = EMAILS.find(x => x.id === id);
  if (!e) return;

  const avatar = initials(e.from_name);
  const tgText = encodeURIComponent(`EMAILREPLY: ${e.subject}\nFrom: ${e.from_name} <${e.from_addr}>\nInstruction: `);
  const tgLink = `https://t.me/${BOT}?text=${tgText}`;

  const flagText = encodeURIComponent(`DECISION: Email from ${e.from_name} — "${e.subject}" > Flag this for a decision — what should I do?`);
  const flagLink = `https://t.me/${BOT}?text=${flagText}`;

  document.getElementById('email-detail').innerHTML = `
    <div class="detail-header">
      <div class="detail-subject">${e.subject}</div>
      <div class="detail-from">
        <div class="detail-from-avatar">${avatar}</div>
        <div class="detail-from-info">
          <div class="detail-from-name">${e.from_name}</div>
          <div class="detail-from-addr">${e.from_addr}</div>
        </div>
        <span class="detail-time">${e.time_display}</span>
      </div>
    </div>
    <div class="detail-body">${e.body}</div>
    <div class="detail-actions">
      <a class="btn btn-primary" href="${tgLink}" target="_blank">💬 Reply with Junior</a>
      <a class="btn btn-secondary" href="${flagLink}" target="_blank">⚡ Flag as Decision</a>
      <button class="btn btn-ghost" onclick="markHandled('${e.id}')">✓ Handled</button>
    </div>
  `;
}

function markHandled(id) {
  handled.add(id);
  localStorage.setItem('handled_emails', JSON.stringify([...handled]));
  if (selectedId === id) {
    selectedId = null;
    document.getElementById('email-detail').innerHTML = '<div class="detail-empty">Select an email to read it</div>';
  }
  renderList();
}

function filterTab(tab) {
  currentTab = tab;
  ['all','priority','reply'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  renderList();
}

renderList();
</script>
