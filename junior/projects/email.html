<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jesse — Inbox</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F6F1E9; --cream-deep: #EDE7DA; --card: #FDFAF5;
  --card-border: #E8E0D0; --ink: #2C2318; --ink-mid: #6B5F52;
  --ink-light: #A09080; --sage: #7A9E7E; --sage-bg: #EBF3EB;
  --amber: #C48A2A; --amber-bg: #FBF3E2;
  --terracotta: #C05A35; --terracotta-bg: #FAE9E2;
  --blue: #3A6EA5; --blue-bg: #E5EEF8;
  --green: #2E7D47; --green-bg: #E8F5EE;
  --rule: #DDD5C5;
  --shadow: 0 1px 4px rgba(44,35,24,0.07), 0 2px 12px rgba(44,35,24,0.04);
  --shadow-lg: 0 4px 20px rgba(44,35,24,0.12);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--cream); color: var(--ink); font-size: 14px; height: 100vh;
  display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
.header { background: var(--cream-deep); border-bottom: 1px solid var(--rule);
  padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.header-back { font-size: 13px; font-weight: 700; color: var(--blue);
  text-decoration: none; display: flex; align-items: center; gap: 4px; padding: 5px 10px;
  border-radius: 6px; background: var(--blue-bg); border: 1px solid #C5D9EF; }
.header-back:hover { background: #d5e6f5; }
.header h1 { font-size: 17px; font-weight: 800; color: var(--ink); }
.header-status { font-size: 11px; color: var(--ink-light); margin-left: auto;
  display: flex; align-items: center; gap: 10px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
.status-dot.live { background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.unread-badge { background: var(--terracotta); color: #fff; font-size: 11px;
  font-weight: 800; border-radius: 10px; padding: 2px 8px; }
.btn-refresh { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: var(--card); border: 1px solid var(--card-border);
  color: var(--ink-mid); transition: all 0.15s; }
.btn-refresh:hover { border-color: var(--ink-mid); color: var(--ink); }
.btn-refresh.loading { opacity: 0.5; }

/* TABS */
.tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--rule);
  flex-shrink: 0; padding: 0 20px; }
.tab { padding: 10px 14px; font-size: 12px; font-weight: 700; color: var(--ink-light);
  cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s; white-space: nowrap; }
.tab:hover { color: var(--ink); }
.tab.active { color: var(--terracotta); border-bottom-color: var(--terracotta); }
.tab-count { font-size: 10px; background: var(--cream-deep); border-radius: 8px;
  padding: 1px 6px; margin-left: 4px; font-weight: 800; color: var(--ink-mid); }
.tab.active .tab-count { background: var(--terracotta-bg); color: var(--terracotta); }

/* MAIN LAYOUT */
.main { display: flex; flex: 1; overflow: hidden; }

/* EMAIL LIST */
.email-list { width: 340px; flex-shrink: 0; border-right: 1px solid var(--rule);
  overflow-y: auto; background: var(--card); }
.email-item { padding: 12px 16px; border-bottom: 1px solid var(--rule);
  cursor: pointer; transition: background 0.1s; position: relative; }
.email-item:hover { background: var(--cream); }
.email-item.selected { background: var(--cream-deep); border-right: 3px solid var(--terracotta); }
.email-item.unread { border-left: 3px solid var(--terracotta); padding-left: 13px; }
.email-item.handled { opacity: 0.35; }
.email-from { font-size: 12px; font-weight: 700; color: var(--ink);
  display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.email-from-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.email-time { font-size: 10px; color: var(--ink-light); flex-shrink: 0; }
.email-subject { font-size: 12px; font-weight: 600; color: var(--ink-mid);
  margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.email-preview { font-size: 11px; color: var(--ink-light); margin-top: 3px;
  line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden; }
.email-cat { font-size: 9px; font-weight: 800; text-transform: uppercase;
  padding: 1px 5px; border-radius: 3px; letter-spacing: 0.4px; flex-shrink: 0; }
.cat-priority { background: var(--terracotta-bg); color: var(--terracotta); }
.cat-reply { background: var(--amber-bg); color: var(--amber); }
.cat-updates { background: var(--cream-deep); color: var(--ink-light); }

/* EMAIL DETAIL */
.email-detail { flex: 1; overflow-y: auto; display: flex; flex-direction: column; background: var(--cream); }
.detail-empty { display: flex; align-items: center; justify-content: center;
  flex: 1; color: var(--ink-light); font-size: 14px; font-style: italic; flex-direction: column; gap: 12px; }
.detail-empty-icon { font-size: 40px; opacity: 0.4; }

/* DETAIL CONTENT */
.detail-content { padding: 24px 28px; max-width: 800px; display: flex; flex-direction: column; gap: 0; }

.detail-header { margin-bottom: 0; }
.detail-subject { font-size: 20px; font-weight: 800; color: var(--ink); line-height: 1.3; margin-bottom: 12px; }
.detail-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.detail-avatar { width: 32px; height: 32px; border-radius: 50%;
  background: var(--amber); color: #fff; font-size: 12px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.detail-from-name { font-size: 13px; font-weight: 700; color: var(--ink); }
.detail-from-addr { font-size: 11px; color: var(--ink-light); }
.detail-time { font-size: 11px; color: var(--ink-light); margin-left: auto; }
.detail-cat-badge { font-size: 10px; font-weight: 800; text-transform: uppercase;
  padding: 2px 8px; border-radius: 4px; letter-spacing: 0.4px; }

/* EMAIL BODY */
.detail-divider { height: 1px; background: var(--rule); margin: 0 0 20px; }
.detail-body { font-size: 14px; color: var(--ink-mid); line-height: 1.8;
  word-break: break-word; margin-bottom: 24px; }
.detail-body p { margin-bottom: 12px; }
.detail-body p:last-child { margin-bottom: 0; }

/* JUNIOR BRIEF */
.brief-section { background: var(--card); border: 1px solid var(--card-border);
  border-radius: 12px; padding: 18px 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
.brief-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.brief-icon { width: 28px; height: 28px; background: var(--terracotta); border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; flex-shrink: 0; }
.brief-title { font-size: 13px; font-weight: 800; color: var(--ink); }
.brief-subtitle { font-size: 11px; color: var(--ink-light); }
.brief-load-btn { margin-left: auto; padding: 5px 12px; border-radius: 6px;
  font-size: 12px; font-weight: 700; cursor: pointer; background: var(--terracotta);
  color: #fff; border: none; transition: all 0.15s; }
.brief-load-btn:hover { background: #A84A28; }
.brief-load-btn:disabled { opacity: 0.5; }
.brief-loading { color: var(--ink-light); font-size: 13px; font-style: italic;
  padding: 8px 0; display: none; }

.brief-summary { font-size: 13px; color: var(--ink-mid); line-height: 1.6;
  margin-bottom: 14px; padding: 10px 14px; background: var(--cream);
  border-radius: 8px; border-left: 3px solid var(--terracotta); }

.brief-actions-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.brief-action-item { display: flex; align-items: flex-start; gap: 8px;
  font-size: 12px; color: var(--ink-mid); padding: 6px 10px;
  background: var(--amber-bg); border-radius: 6px; }
.brief-action-bullet { color: var(--amber); font-weight: 800; flex-shrink: 0; margin-top: 1px; }

/* COMPOSE SECTION */
.compose-section { background: var(--card); border: 1px solid var(--card-border);
  border-radius: 12px; padding: 18px 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
.compose-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.compose-icon { width: 28px; height: 28px; background: var(--blue); border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; flex-shrink: 0; }
.compose-title { font-size: 13px; font-weight: 800; color: var(--ink); }

.draft-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.draft-option { padding: 10px 14px; border: 1px solid var(--card-border);
  border-radius: 8px; cursor: pointer; background: var(--cream);
  font-size: 12px; color: var(--ink-mid); line-height: 1.6; transition: all 0.15s;
  position: relative; }
.draft-option:hover { border-color: var(--blue); background: var(--blue-bg); }
.draft-option.selected { border-color: var(--blue); background: var(--blue-bg); box-shadow: 0 0 0 2px rgba(58,110,165,0.15); }
.draft-option-label { font-size: 10px; font-weight: 800; text-transform: uppercase;
  color: var(--blue); letter-spacing: 0.4px; margin-bottom: 4px; }
.draft-option-text { white-space: pre-wrap; }

.compose-area { margin-top: 4px; }
.compose-label { font-size: 11px; font-weight: 700; color: var(--ink-mid);
  text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
.compose-textarea { width: 100%; min-height: 120px; padding: 12px 14px;
  border: 1px solid var(--card-border); border-radius: 8px; font-family: inherit;
  font-size: 13px; color: var(--ink); background: var(--cream); resize: vertical;
  line-height: 1.7; transition: border-color 0.15s; }
.compose-textarea:focus { outline: none; border-color: var(--blue); background: #fff; }
.compose-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

/* BUTTONS */
.btn { padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 700;
  cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid transparent; transition: all 0.15s; white-space: nowrap; }
.btn-primary { background: var(--terracotta); color: #fff; border-color: var(--terracotta); }
.btn-primary:hover { background: #A84A28; }
.btn-send { background: var(--green); color: #fff; border-color: var(--green); }
.btn-send:hover { background: #236638; }
.btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: var(--card); color: var(--ink); border-color: var(--card-border); }
.btn-secondary:hover { border-color: var(--ink-mid); }
.btn-ghost { background: none; color: var(--ink-light); border-color: var(--card-border); }
.btn-ghost:hover { color: var(--ink); border-color: var(--ink-mid); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ACTION BAR */
.action-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }

/* TOAST */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink);
  color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600;
  box-shadow: var(--shadow-lg); opacity: 0; transform: translateY(10px);
  transition: all 0.3s; pointer-events: none; z-index: 1000; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--green); }
.toast.error { background: var(--terracotta); }

/* LOADING SPINNER */
.spinner { display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ERROR BANNER */
.error-banner { background: var(--terracotta-bg); border: 1px solid #E8C0B0;
  border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--terracotta);
  margin: 16px; display: none; }

@media (max-width: 750px) {
  .main { flex-direction: column; }
  .email-list { width: 100%; height: 45vh; border-right: none; border-bottom: 1px solid var(--rule); }
  .detail-content { padding: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="header-back">← Dashboard</a>
  <h1>Inbox</h1>
  <span id="unread-badge" class="unread-badge" style="display:none">0</span>
  <div class="header-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Loading...</span>
    <button class="btn-refresh" id="refresh-btn" onclick="loadEmails()">Refresh</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="filterTab('all')" id="tab-all">All <span class="tab-count" id="count-all">0</span></div>
  <div class="tab" onclick="filterTab('priority')" id="tab-priority">Priority <span class="tab-count" id="count-priority">0</span></div>
  <div class="tab" onclick="filterTab('reply')" id="tab-reply">Needs Reply <span class="tab-count" id="count-reply">0</span></div>
</div>

<div class="main">
  <div class="email-list" id="email-list">
    <div class="detail-empty" style="height:100%;padding:40px 16px;text-align:center;font-size:13px;color:var(--ink-light);">
      Loading inbox...
    </div>
  </div>
  <div class="email-detail" id="email-detail">
    <div class="detail-empty">
      <div class="detail-empty-icon">📬</div>
      <span>Select an email to read</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://especially-eco-joseph-regardless.trycloudflare.com';
const JESSE_TG = '7989359858';
const BOT = 'bgv_junior_bot';

let allEmails = [];
let currentTab = 'all';
let selectedId = null;
let handledIds = new Set(); // loaded from server-side state
let refreshTimer = null;

// ── UTIL ──────────────────────────────────────────────────────────────────────

function showToast(msg, type='', duration=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', duration);
}

function avatarInitials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  return parts.length >= 2
    ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
    : name.slice(0,2).toUpperCase();
}

function avatarColor(str) {
  const colors = ['#C05A35','#C48A2A','#7A9E7E','#3A6EA5','#8B5E83','#5E8B6E'];
  let h = 0;
  for (let i=0; i<str.length; i++) h = str.charCodeAt(i) + ((h<<5)-h);
  return colors[Math.abs(h) % colors.length];
}

function cleanBody(raw) {
  if (!raw) return '';
  // Remove encoded characters
  let s = raw
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&nbsp;/g,' ').replace(/&quot;/g,'"').replace(/&#39;/g,"'")
    .replace(/&#\d+;/g,'');
  // Remove leftover HTML tags
  s = s.replace(/<[^>]+>/g,' ');
  // Normalize whitespace - keep paragraph structure
  s = s.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  // Collapse runs of blank lines to max 2
  s = s.replace(/\n{3,}/g,'\n\n');
  // Trim each line
  s = s.split('\n').map(l=>l.trim()).join('\n');
  return s.trim();
}

function bodyToParagraphs(text) {
  if (!text) return '<p>No content.</p>';
  const paras = text.split(/\n\n+/).filter(p=>p.trim());
  if (paras.length <= 1) {
    // Try single newline split
    const lines = text.split('\n').filter(l=>l.trim());
    if (lines.length > 1) {
      return lines.map(l=>`<p>${escHtml(l)}</p>`).join('');
    }
  }
  return paras.map(p=>`<p>${escHtml(p.replace(/\n/g,' '))}</p>`).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatFullDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleString('en-GB', {weekday:'short',day:'numeric',month:'short',
      year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'});
  } catch(e) { return iso; }
}

// ── LOAD EMAILS ───────────────────────────────────────────────────────────────

async function loadEmails(silent=false) {
  const btn = document.getElementById('refresh-btn');
  const dot = document.getElementById('status-dot');
  const statusTxt = document.getElementById('status-text');
  if (!silent) {
    btn.textContent = 'Loading...';
    btn.disabled = true;
  }
  dot.className = 'status-dot';
  try {
    const res = await fetch(API + '/emails?count=40', {cache:'no-store'});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allEmails = await res.json();
    dot.className = 'status-dot live';
    const now = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    statusTxt.textContent = 'Live · ' + now;
    renderList();
    updateCounts();
    if (!silent) showToast('Inbox refreshed', 'success');
  } catch(e) {
    dot.className = 'status-dot';
    dot.style.background = 'var(--terracotta)';
    statusTxt.textContent = 'Offline';
    if (!silent) showToast('Could not reach email API — is the server running?', 'error', 5000);
  } finally {
    btn.textContent = 'Refresh';
    btn.disabled = false;
  }
}

function updateCounts() {
  const visible = allEmails.filter(e=>!handledIds.has(e.id));
  document.getElementById('count-all').textContent = visible.length;
  document.getElementById('count-priority').textContent = visible.filter(e=>e.category==='priority').length;
  document.getElementById('count-reply').textContent = visible.filter(e=>e.category==='reply').length;
  const unread = visible.filter(e=>!e.is_read).length;
  const badge = document.getElementById('unread-badge');
  badge.textContent = unread;
  badge.style.display = unread > 0 ? '' : 'none';
}

function filterTab(tab) {
  currentTab = tab;
  ['all','priority','reply'].forEach(t => {
    document.getElementById('tab-'+t).className = 'tab' + (t===tab?' active':'');
  });
  renderList();
}

function renderList() {
  const list = document.getElementById('email-list');
  let emails = allEmails;
  if (currentTab === 'priority') emails = emails.filter(e=>e.category==='priority');
  if (currentTab === 'reply') emails = emails.filter(e=>e.category==='reply');

  if (!emails.length) {
    list.innerHTML = '<div class="detail-empty" style="height:100%;padding:40px 16px;text-align:center;font-size:13px;color:var(--ink-light);">No emails in this view</div>';
    return;
  }

  list.innerHTML = emails.map(e => {
    const handled = handledIds.has(e.id);
    const catClass = 'cat-'+e.category;
    const catLabel = e.category === 'priority' ? 'Priority' : e.category === 'reply' ? 'Reply' : '';
    return `<div class="email-item${e.is_read?'':' unread'}${handled?' handled':''}${e.id===selectedId?' selected':''}"
      onclick="selectEmail('${e.id}')">
      <div class="email-from">
        <span class="email-from-name">${escHtml(e.from_name || e.from_addr)}</span>
        <span class="email-time">${escHtml(e.time_display||'')}</span>
        ${catLabel ? `<span class="email-cat ${catClass}">${catLabel}</span>` : ''}
      </div>
      <div class="email-subject">${escHtml(e.subject||'(no subject)')}</div>
      <div class="email-preview">${escHtml(e.preview||'')}</div>
    </div>`;
  }).join('');
}

// ── EMAIL DETAIL ──────────────────────────────────────────────────────────────

function selectEmail(id) {
  selectedId = id;
  renderList(); // update selected highlight
  const e = allEmails.find(x=>x.id===id);
  if (!e) return;
  renderDetail(e);
}

function renderDetail(e) {
  const detail = document.getElementById('email-detail');
  const body = cleanBody(e.body || e.preview || '');
  const bodyHtml = bodyToParagraphs(body);
  const initials = avatarInitials(e.from_name);
  const avColor = avatarColor(e.from_addr||'');
  const catLabel = e.category==='priority'?'Priority':e.category==='reply'?'Needs Reply':'';
  const catClass = 'cat-'+e.category;
  const tgReply = `https://t.me/${BOT}?text=${encodeURIComponent('EMAILREPLY: '+e.subject+'\nFrom: '+e.from_name+' <'+e.from_addr+'>\nInstruction: ')}`;
  const tgDecision = `https://t.me/${BOT}?text=${encodeURIComponent('DECISION: Email from '+e.from_name+' re: '+e.subject+'\nDecision needed: ')}`;

  detail.innerHTML = `<div class="detail-content" id="detail-content">

    <div class="detail-header">
      <div class="detail-subject">${escHtml(e.subject||'(no subject)')}</div>
      <div class="detail-meta">
        <div class="detail-avatar" style="background:${avColor}">${initials}</div>
        <div>
          <div class="detail-from-name">${escHtml(e.from_name||'')}</div>
          <div class="detail-from-addr">${escHtml(e.from_addr||'')}</div>
        </div>
        <div class="detail-time">${formatFullDate(e.date)}</div>
        ${catLabel?`<span class="detail-cat-badge ${catClass}">${catLabel}</span>`:''}
      </div>
    </div>

    <div class="detail-divider"></div>

    <div class="detail-body" id="detail-body">${bodyHtml}</div>

    <div class="action-bar">
      <button class="btn btn-primary btn-sm" onclick="loadBrief('${e.id}')">🎯 Get Junior's Brief</button>
      <button class="btn btn-secondary btn-sm" onclick="openCompose('${e.id}')">✏️ Draft Reply</button>
      <a href="${tgDecision}" target="_blank" class="btn btn-secondary btn-sm">🔀 Flag Decision</a>
      <button class="btn btn-ghost btn-sm" onclick="markHandled('${e.id}')">✓ Handled</button>
    </div>

    <div id="brief-section" style="display:none" class="brief-section">
      <div class="brief-header">
        <div class="brief-icon">🎯</div>
        <div>
          <div class="brief-title">Junior's Brief</div>
          <div class="brief-subtitle" id="brief-sub">Loading...</div>
        </div>
      </div>
      <div id="brief-body"></div>
    </div>

    <div id="compose-section" style="display:none" class="compose-section">
      <div class="compose-header">
        <div class="compose-icon">✏️</div>
        <div class="compose-title">Draft Reply</div>
      </div>
      <div id="draft-options" class="draft-options" style="display:none"></div>
      <div class="compose-area">
        <div class="compose-label">Your reply</div>
        <textarea class="compose-textarea" id="compose-text" placeholder="Type your reply here, or load Junior's drafts above..."></textarea>
      </div>
      <div class="compose-actions">
        <button class="btn btn-send" id="send-btn" onclick="sendReply('${e.id}','${escHtml(e.from_addr)}','${escHtml(e.subject)}')">
          Send Reply
        </button>
        <a href="${tgReply}" target="_blank" class="btn btn-secondary btn-sm">💬 Draft with Junior on Telegram</a>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('compose-section').style.display='none'">Cancel</button>
      </div>
    </div>

  </div>`;
}

// ── JUNIOR BRIEF ──────────────────────────────────────────────────────────────

async function loadBrief(emailId) {
  const section = document.getElementById('brief-section');
  const sub = document.getElementById('brief-sub');
  const body = document.getElementById('brief-body');
  section.style.display = '';
  sub.textContent = 'Generating...';
  body.innerHTML = '<div class="brief-loading" style="display:block;padding:8px 0;color:var(--ink-light);font-size:13px;font-style:italic;">Analysing email...</div>';

  // Scroll into view
  section.scrollIntoView({behavior:'smooth', block:'nearest'});

  try {
    const res = await fetch(`${API}/synopsis?id=${encodeURIComponent(emailId)}`, {cache:'no-store'});
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();

    sub.textContent = 'Analysis ready';

    let html = '';
    if (data.summary) {
      html += `<div class="brief-summary">${escHtml(data.summary)}</div>`;
    }
    if (data.actions && data.actions.length) {
      html += `<div class="brief-actions-list">${data.actions.map(a=>`
        <div class="brief-action-item">
          <span class="brief-action-bullet">→</span>
          <span>${escHtml(a)}</span>
        </div>`).join('')}</div>`;
    }
    if (data.drafts && data.drafts.length) {
      html += `<div style="margin-top:4px">
        <div class="compose-label" style="margin-bottom:8px">Suggested responses</div>
        <div class="draft-options">
          ${data.drafts.map((d,i)=>`
            <div class="draft-option" onclick="useDraft(this, ${JSON.stringify(d)})">
              <div class="draft-option-label">Option ${i+1}</div>
              <div class="draft-option-text">${escHtml(d)}</div>
            </div>`).join('')}
        </div>
      </div>`;
    }
    body.innerHTML = html || '<p style="color:var(--ink-light);font-size:13px">No additional analysis available.</p>';
  } catch(e) {
    sub.textContent = 'Could not load brief';
    body.innerHTML = `<div style="color:var(--ink-light);font-size:12px;padding:8px 0">
      API not available. Use the Telegram button to get Junior's analysis.<br>
      <a href="https://t.me/${BOT}" target="_blank" style="color:var(--blue)">Open Telegram</a>
    </div>`;
  }
}

function useDraft(el, text) {
  // Mark selected
  document.querySelectorAll('.draft-option').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
  // Open compose with this draft
  openCompose(selectedId);
  const ta = document.getElementById('compose-text');
  if (ta) { ta.value = text; ta.focus(); }
}

// ── COMPOSE ───────────────────────────────────────────────────────────────────

function openCompose(emailId) {
  const section = document.getElementById('compose-section');
  if (!section) return;
  section.style.display = '';
  section.scrollIntoView({behavior:'smooth', block:'nearest'});
  const ta = document.getElementById('compose-text');
  if (ta && !ta.value) ta.focus();
}

async function sendReply(emailId, toAddr, subject) {
  const ta = document.getElementById('compose-text');
  const btn = document.getElementById('send-btn');
  if (!ta || !ta.value.trim()) {
    showToast('Write your reply first', 'error');
    return;
  }

  const confirm = window.confirm(`Send this reply to ${toAddr}?\n\n${ta.value.trim().slice(0,200)}${ta.value.length>200?'...':''}`);
  if (!confirm) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Sending...';

  try {
    const res = await fetch(`${API}/send`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        message_id: emailId,
        body: ta.value.trim()
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(()=>({error:'Unknown error'}));
      throw new Error(err.error || 'HTTP '+res.status);
    }
    showToast('Reply sent successfully', 'success');
    ta.value = '';
    document.getElementById('compose-section').style.display = 'none';
    markHandled(emailId);
  } catch(e) {
    showToast('Send failed: ' + e.message, 'error', 6000);
    btn.disabled = false;
    btn.textContent = 'Send Reply';
  }
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────

function markHandled(id) {
  handledIds.add(id);
  saveHandled();
  updateCounts();
  renderList();
  showToast('Marked as handled');
  // Clear detail if this was selected
  if (id === selectedId) {
    selectedId = null;
    document.getElementById('email-detail').innerHTML = `
      <div class="detail-empty">
        <div class="detail-empty-icon">✓</div>
        <span>Email handled</span>
      </div>`;
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────

// Load server-side state first, then emails
async function init() {
  try {
    const r = await fetch(API+'/state', {cache:'no-store'});
    if (r.ok) {
      const state = await r.json();
      handledIds = new Set(state.handled_emails || []);
    }
  } catch(e) {}
  loadEmails();
}

async function saveHandled() {
  try {
    await fetch(API+'/state', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({handled_emails: [...handledIds]})
    });
  } catch(e) {}
}

init();
refreshTimer = setInterval(()=>loadEmails(true), 90000);
</script>
</body>
</html>
