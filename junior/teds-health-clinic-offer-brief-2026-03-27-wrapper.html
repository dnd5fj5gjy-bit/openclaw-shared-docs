    <h1>Ted's Health Clinic Partner Offer Brief</h1>
    <div class=&quot;subtitle&quot;>Prepared by Junior · 2026-03-27</div>
  </div>

  <h2>Executive summary</h2>
  <p>Ted's Health should package itself as the <strong>operating layer for men's health clinics</strong>, not another consumer telehealth brand. The pitch is simple: Ted's provides the backend that lets a clinic launch or upgrade a men's health offer without having to build prescribing operations, patient comms, logistics, repeat ordering flows, or optimisation systems from scratch.</p>
  <p>This brief turns that strategy into a usable sales document. It defines the offer, the target clinic profile, the commercial structure, implementation shape, objections, and the immediate assets needed to start selling.</p>

  <div class=&quot;callout&quot;>
    <strong>Core positioning:</strong> white-label men's health backend for UK clinics. The clinic keeps the brand. Ted's runs the engine room.
  </div>

  <h2>The core offer</h2>
  <p>Ted's Health provides a clinic with:</p>
  <ul>
    <li>branded or co-branded patient journey design</li>
    <li>telemedicine workflow and eligibility intake</li>
    <li>prescription coordination and repeat fulfilment logic</li>
    <li>patient support operations and retention flows</li>
    <li>treatment programme reporting and optimisation support</li>
    <li>growth assets for landing pages, email/SMS nurture, and conversion scripts</li>
  </ul>

  <h2>Why this angle is strong</h2>
  <ul>
    <li>faster launch time</li>
    <li>lower operational complexity</li>
    <li>better patient retention</li>
    <li>more predictable recurring revenue</li>
    <li>less dependence on ad-hoc admin work</li>
  </ul>
  <p>Ted's can win by selling <strong>speed, reliability, and recurring economics</strong>.</p>

  <h2>Ideal customer profile</h2>
  <ol>
    <li>UK clinics already treating men in adjacent categories: TRT, weight loss, sexual health, diagnostics, longevity.</li>
    <li>Practices with clinical credibility but weak operational systems.</li>
    <li>Founder-led or small-group clinics that need to move quickly and care about margin.</li>
    <li>Clinics with existing traffic or patient lists but poor follow-up and retention.</li>
  </ol>
  <p><strong>Avoid first:</strong> enterprise health groups with slow procurement, clinics demanding bespoke builds upfront, and partners without clinical ownership clarity.</p>

  <h2>What Ted's should sell</h2>

  <h3>Option A — Launch-in-a-box</h3>
  <p>For clinics that want a fast start: intake flow, onboarding, repeat order flows, support SOP starter pack, reporting dashboard spec, and 30-day implementation support.</p>

  <h3>Option B — Operational upgrade</h3>
  <p>For clinics already running a men's health service with messy operations: conversion audit, retention redesign, communications overhaul, bottleneck review, and KPI dashboard cadence.</p>

  <h3>Option C — Full white-label backend</h3>
  <p>For partners wanting Ted's as the ongoing operating layer: workflow management, recurring treatment operations design, lifecycle messaging, monthly performance review, and experimentation roadmap.</p>

  <h2>Commercial structure</h2>
  <ul>
    <li><strong>Setup fee:</strong> paid implementation/onboarding fee</li>
    <li><strong>Monthly retainer:</strong> covers operations layer, optimisation, reporting, support</li>
    <li><strong>Performance upside:</strong> optional revenue share tied to active patients, refill rate, or retained monthly revenue</li>
  </ul>

  <h2>First sales narrative</h2>
  <ol>
    <li>Clinics are leaving money on the table because men's health programmes are operationally messy.</li>
    <li>Ted's already understands the patient journey and recurring treatment economics.</li>
    <li>Instead of hiring ops, CRM, growth, and workflow capability separately, the clinic plugs into Ted's backend.</li>
    <li>The result: faster launch, cleaner patient experience, better refill behaviour, and stronger unit economics.</li>
  </ol>

  <h2>Common objections and answers</h2>
  <h3>Why not build this ourselves?</h3>
  <p>Because building the system is slower, riskier, and distracts clinical leadership. Ted's compresses months of trial and error into a ready operating model.</p>

  <h3>Are you a clinic or a software provider?</h3>
  <p>Ted's is the <strong>specialist men's health operating partner</strong>. Software is part of it; workflows, fulfilment logic, retention ops, and programme optimisation are the real value.</p>

  <h3>How much internal effort is required from us?</h3>
  <p>Minimal. The clinic needs a clinical owner, brand input, and approval on workflows. Ted's handles the implementation architecture and operating cadence.</p>

  <h2>Risks to address now</h2>
  <ol>
    <li><strong>Website trust issue:</strong> current public notes indicate a Cloudflare/SSL handshake problem on tedshealth.co.uk. Fix this before scaling outreach.</li>
    <li><strong>Proof gap:</strong> the sales material must show a concrete operating model, not a vague consultancy pitch.</li>
    <li><strong>Compliance ambiguity:</strong> partner discussions need clear boundaries around prescribing, clinical responsibility, marketing claims, and patient communications.</li>
    <li><strong>Over-customisation risk:</strong> early deals can become service-heavy if the offer is not productised.</li>
  </ol>

  <h2>Immediate assets to create next</h2>
  <ol>
    <li>clinic outreach one-pager</li>
    <li>partner deck (8-10 slides)</li>
    <li>implementation checklist</li>
    <li>KPI dashboard mockup</li>
    <li>compliance and responsibility page</li>
    <li>outreach email / LinkedIn message templates for clinic founders</li>
  </ol>

  <h2>30-day execution plan</h2>
  <h3>Week 1</h3>
  <ul>
    <li>fix website trust/SSL issue</li>
    <li>finalise 3 package structure</li>
    <li>turn this brief into a one-pager and short deck</li>
  </ul>
  <h3>Week 2</h3>
  <ul>
    <li>build sample partner KPI dashboard mockup</li>
    <li>draft outreach copy and discovery call script</li>
    <li>define implementation checklist and SOP skeleton</li>
  </ul>
  <h3>Week 3</h3>
  <ul>
    <li>compile target list of UK clinics</li>
    <li>start founder-led outreach</li>
    <li>run 5 to 10 discovery conversations</li>
  </ul>
  <h3>Week 4</h3>
  <ul>
    <li>refine pricing and packaging from call feedback</li>
    <li>tighten objections handling</li>
    <li>close first pilot partner with narrow scope</li>
  </ul>

  <h2>Bottom line</h2>
  <p>Ted's Health should stop sounding like a consumer brand in search of attention and start sounding like a <strong>category-specific operating platform for clinics</strong>. The opportunity is strong because clinics already understand demand; what they lack is a clean, repeatable backend. Ted's can own that layer if it productises the offer, fixes trust blockers, and sells a simple package with clear economics.</p>
